<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MyBoutique — Relay Montparnasse</title>
<style>
:root{
  --red:#E8192C;
  --red2:#fee2e2;
  --orange:#f97316;
  --orange2:#fef3c7;
  --green:#16A34A;
  --green2:#dcfce7;
  --blue:#2563eb;
  --bg:#f2f2f7;
  --line:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}
button,input{font:inherit}
button{cursor:pointer}
body{padding-bottom:84px}

/* HEADER */
.header{
  position:sticky;top:0;z-index:50;
  background:var(--red);color:#fff;
  padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.header h1{margin:0;font-size:18px;line-height:1.1}
.header h1 span{opacity:.8;font-weight:400}
.header .sub{font-size:11px;opacity:.85;margin-top:2px}
.header-right{text-align:right;font-size:11px;opacity:.9;line-height:1.4}

/* PAGES */
.page{display:none;padding:14px}
.page.active{display:block}

/* NAV */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:100;
  display:grid;grid-template-columns:repeat(7,1fr);
  background:#fff;border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav button{
  border:none;background:none;color:#9ca3af;
  padding:8px 4px 6px;font-size:10px;
  display:flex;flex-direction:column;align-items:center;gap:2px
}
.nav button.active{color:var(--red);font-weight:700}
.nav .ic{font-size:20px;line-height:1}

/* COMMON */
.section{margin-bottom:16px}
.section-head{
  background:var(--red);color:#fff;
  padding:9px 12px;border-radius:10px 10px 0 0;
  font-size:12px;font-weight:700;letter-spacing:.3px;
  display:flex;justify-content:space-between;align-items:center;gap:10px
}
.section-body{
  background:#fff;border:1px solid var(--line);border-top:none;
  border-radius:0 0 10px 10px;overflow:hidden
}
.btn-reset{
  border:none;background:rgba(255,255,255,.2);color:#fff;
  border-radius:7px;padding:4px 9px;font-size:10px;font-weight:700
}
.empty-msg{padding:18px;text-align:center;color:#9ca3af;font-size:12px}
.card{
  background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px
}
.list-head{
  background:var(--red);color:#fff;padding:9px 14px;
  border-radius:10px 10px 0 0;font-size:12px;font-weight:700;
  display:flex;justify-content:space-between;align-items:center;gap:10px
}
.list-badge{
  background:rgba(255,255,255,.22);border-radius:999px;padding:2px 8px;font-size:11px
}
.list-body{
  background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;overflow:hidden
}
.list-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f3f4f6
}
.list-row:last-child{border-bottom:none}
.list-row.done{opacity:.45}
.list-row.done .list-txt{text-decoration:line-through}
.list-chk{
  width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none
}
.list-row.done .list-chk{background:var(--green);border-color:var(--green);color:#fff}
.list-txt{flex:1;font-size:13px;font-weight:500}
.add-form{
  display:flex;gap:8px;padding:10px 14px;background:#fafafa;border-top:1px solid #f3f4f6
}
.add-form input{
  border:1px solid #d1d5db;border-radius:8px;padding:10px 12px;outline:none;background:#fff
}
.add-form input:focus{border-color:var(--red)}
.add-btn{
  background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:18px;font-weight:700
}

/* DASH */
.dash-title{font-size:17px;font-weight:700;margin-bottom:2px}
.dash-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
.stat-card.red{border-color:var(--red);background:#fff5f5}
.stat-card.orange{border-color:var(--orange);background:#fff7ed}
.stat-card.green{border-color:var(--green);background:#f0fdf4}
.stat-card.blue{border-color:var(--blue);background:#eff6ff}
.stat-icon{font-size:24px;margin-bottom:6px}
.stat-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:28px;font-weight:800;line-height:1.05;margin-top:2px}
.stat-card.red .stat-val{color:var(--red)}
.stat-card.orange .stat-val{color:var(--orange)}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.blue .stat-val{color:var(--blue)}
.stat-sub{font-size:10px;color:#6b7280;margin-top:2px}

.block{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px}
.block-title{
  padding:10px 14px;border-bottom:1px solid #f3f4f6;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#9ca3af
}
.action-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f3f4f6
}
.action-row:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.red{background:var(--red)} .dot.orange{background:var(--orange)} .dot.green{background:var(--green)}
.action-text{flex:1;font-size:13px;font-weight:500}
.badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px
}
.badge.red{background:var(--red2);color:var(--red)}
.badge.orange{background:var(--orange2);color:var(--orange)}

/* TABLES */
.search-wrap{display:flex;gap:8px;margin-bottom:12px}
.search-wrap input{
  flex:1;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;outline:none;background:#fff
}
.search-wrap input:focus{border-color:var(--red)}
.btn-recap{
  background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700
}
#search-results{display:none;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;background:#fff}
thead tr{background:#2f2f2f;color:#fff}
thead th{padding:8px;text-align:left;font-size:11px;font-weight:700;border-right:1px solid #444}
thead th:last-child{border-right:none}
tbody tr{border-bottom:1px solid #f3f4f6}
tbody tr:nth-child(even){background:#fafafa}
td{padding:9px 8px;border-right:1px solid #f3f4f6;vertical-align:middle}
td:last-child{border-right:none}
td.nom{font-weight:600}
td.place{font-size:11px;color:#6b7280}
td.ctrl{text-align:center;white-space:nowrap}
td.stat{text-align:center;font-size:11px;font-weight:700}
td.stat.ok{color:var(--green)} td.stat.warn{color:var(--orange)} td.stat.bad{color:var(--red)} td.stat.over{color:var(--blue)}
.ctrl-wrap{
  display:inline-flex;align-items:center;overflow:hidden;border:1px solid #d1d5db;border-radius:8px
}
.ctrl-btn{
  width:32px;height:32px;border:none;background:#fff;font-size:18px;font-weight:700;color:#333
}
.ctrl-num{
  min-width:36px;line-height:32px;text-align:center;background:#fff;font-size:15px;font-weight:800;padding:0 4px
}
.ctrl-num.ok{color:var(--green)} .ctrl-num.warn{color:var(--orange)} .ctrl-num.bad{color:var(--red)} .ctrl-num.over{color:var(--blue)}
.sep-row td{
  background:#f5f5f5;color:#6b7280;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:5px 8px
}
.recap-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:flex-end;justify-content:center
}
.recap-overlay.open{display:flex}
.sheet{
  width:100%;max-width:440px;max-height:85vh;overflow-y:auto;
  background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 36px
}
.sheet h3{margin:0 0 4px 0;font-size:17px}
.sheet p{margin:0 0 16px 0;color:var(--muted);font-size:12px}
.recap-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6}
.recap-row:last-child{border-bottom:none}
.recap-nom{font-weight:600}
.recap-qty{background:var(--red);color:#fff;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:800}
.btn-full{
  width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;margin-top:16px
}

/* PLANNING */
.week-nav{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.btn-wk{background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:14px;font-weight:700}
.week-label{font-size:13px;font-weight:800}
.days-scroll{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.days-scroll::-webkit-scrollbar{display:none}
.day-pill{
  min-width:50px;padding:8px;border-radius:12px;border:1px solid var(--line);background:#fff;color:#888;font-size:11px;font-weight:700;text-align:center
}
.day-pill .dp{font-size:9px;text-transform:uppercase;margin-bottom:2px}
.day-pill .dd{font-size:17px;font-weight:800;color:#333}
.day-pill.active{border:2px solid var(--red)}
.day-pill.active .dd{color:var(--red)}
.day-pill.today{background:#fff5f5}
.timeline-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;overflow-x:auto;margin-bottom:12px}
.tl-inner{min-width:300px}
.tl-header{display:flex;padding-left:75px;margin-bottom:8px}
.tl-tick{flex:1;font-size:9px;color:#c4c4c4;min-width:28px}
.tl-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.tl-name{width:70px;font-size:11px;font-weight:700;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-track{flex:1;height:30px;background:#f3f4f6;border-radius:6px;position:relative;overflow:hidden}
.tl-bar{position:absolute;height:100%;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;white-space:nowrap;padding:0 6px;overflow:hidden}
.team-list{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
.team-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f3f4f6}
.team-row:last-child{border-bottom:none}
.team-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex:none}
.team-info{flex:1}
.team-nom{font-size:13px;font-weight:800}
.toi-tag{background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:5px}
.team-hrs{font-size:11px;color:#6b7280;margin-top:1px}
.team-start{font-size:14px;font-weight:800;color:var(--green)}
.hours-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:8px}
.hours-title{font-size:11px;font-weight:800;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.hours-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.hours-row:last-child{border-bottom:none}
.hours-nom{font-weight:600}
.hours-val{font-weight:800;color:var(--red)}

/* BOULANGERIE */
.boul-alerte{display:none;background:var(--red2);border:1px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-weight:700;color:var(--red)}
.boul-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.boul-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.boul-card.red{border-color:var(--red);background:#fff5f5}
.boul-card.orange{border-color:var(--orange);background:#fff7ed}
.boul-card.green{border-color:var(--green);background:#f0fdf4}
.boul-emoji{font-size:24px;line-height:1}
.boul-nom{font-size:10px;font-weight:700;color:#333;margin:4px 0;line-height:1.25}
.boul-sub{font-size:9px;color:#6b7280;margin-top:4px}
.boul-ctrl{
  display:inline-flex;align-items:center;overflow:hidden;border:1px solid #d1d5db;border-radius:8px;margin:6px auto 0
}
.boul-btn{width:30px;height:30px;border:none;background:#fff;font-size:17px;font-weight:800;color:#333}
.boul-num{min-width:30px;line-height:30px;text-align:center;background:#fff;font-size:15px;font-weight:800;color:var(--red);padding:0 4px}
.boul-destroy-btn{
  display:block;width:100%;margin-top:6px;border:none;border-radius:6px;padding:5px 6px;font-size:10px;font-weight:800
}
.boul-destroy-btn.off{background:var(--red2);color:var(--red)}
.boul-destroy-btn.on{background:var(--green2);color:var(--green)}
.boul-list-tag{font-size:10px;color:#6b7280}
.boul-meta{font-size:9px;color:#6b7280;margin-top:4px}
.boul-sep{font-size:11px;font-weight:800;color:#9ca3af;text-transform:uppercase;letter-spacing:.7px;margin:14px 0 8px}

/* DLC */
.dlc-red{display:none;background:var(--red2);border:1px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--red)}
.dlc-ora{display:none;background:var(--orange2);border:1px solid var(--orange);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-weight:700;color:var(--orange)}
.dlc-form{padding:10px 12px;background:#fafafa;border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px}
.dlc-form input{border:1px solid #d1d5db;border-radius:8px;padding:10px 12px;outline:none;background:#fff}
.dlc-form input:focus{border-color:var(--red)}
.tag-red{background:var(--red2);color:var(--red);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.tag-ora{background:var(--orange2);color:var(--orange);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.tag-ok{background:var(--green2);color:var(--green);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}

/* COMMANDE & TÂCHES */
.task-delete, .cmd-delete{
  color:var(--red);font-weight:800;cursor:pointer;flex:none
}
.small-muted{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>MyBoutique <span>Relay</span></h1>
    <div class="sub">Gare Montparnasse · Bachir Faye</div>
  </div>
  <div class="header-right" id="hdr-date"></div>
</div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="dash-title">Bonjour Bachir 👋</div>
  <div class="dash-sub" id="home-date"></div>
  <div class="cards-grid" id="home-cards"></div>

  <div class="block">
    <div class="block-title">⚡ Actions urgentes</div>
    <div id="home-actions"></div>
  </div>

  <div class="block">
    <div class="block-title">👥 Équipe aujourd'hui</div>
    <div id="home-team"></div>
  </div>
</div>

<!-- TABAC -->
<div class="page" id="page-tabac">
  <div class="search-wrap">
    <input type="text" id="tabac-search" placeholder="🔍 Rechercher une marque ou un emplacement..." oninput="renderTabacSearch()">
    <button class="btn-recap" onclick="openRecap()">📋 Récap</button>
  </div>
  <div id="search-results"></div>

  <div style="margin-bottom:12px">
    <button class="btn-recap" onclick="resetAllTabac()" style="width:100%;padding:12px 14px">♻️ RESET TABAC COMPLET</button>
  </div>

  <div id="tabac-sections"></div>
</div>

<!-- PLANNING -->
<div class="page" id="page-plan">
  <div class="week-nav">
    <button class="btn-wk" onclick="changeWeek(-1)">◀</button>
    <div class="week-label" id="week-label"></div>
    <button class="btn-wk" onclick="changeWeek(1)">▶</button>
  </div>
  <div class="days-scroll" id="days-scroll"></div>
  <div id="plan-content"></div>
</div>

<!-- BOULANGERIE -->
<div class="page" id="page-boul">
  <div class="boul-alerte" id="boul-alert"></div>

  <div class="section">
    <div class="section-head">🥐 Stock du jour <button class="btn-reset" onclick="newDayBoul()">↺ Nouveau jour</button></div>
    <div class="section-body">
      <div class="boul-grid" id="boul-grid"></div>
    </div>
  </div>

  <div class="section" style="margin-top:0">
    <div class="list-head">🟠 À remettre <span class="list-badge" id="boul-refill-count">0</span></div>
    <div class="list-body" id="boul-refill-list"></div>
  </div>

  <div class="section" style="margin-top:14px">
    <div class="list-head" style="background:var(--blue)">🗑️ À détruire <span class="list-badge" id="boul-destroy-count">0</span></div>
    <div class="list-body" id="boul-destroy-list"></div>
  </div>
</div>

<!-- DLC -->
<div class="page" id="page-dlc">
  <div class="dlc-red" id="dlc-red"></div>
  <div class="dlc-ora" id="dlc-ora"></div>

  <div class="section" style="margin-top:0">
    <div class="section-head">⏱️ DLC Snacking <span class="list-badge" id="dlc-badge">0</span></div>
    <div class="section-body">
      <table>
        <thead>
          <tr>
            <th>Produit</th>
            <th style="width:50px;text-align:center">Gr.</th>
            <th style="width:70px;text-align:center">Date</th>
            <th style="width:80px;text-align:center">Statut</th>
          </tr>
        </thead>
        <tbody id="dlc-body">
          <tr><td colspan="4" class="empty-msg">Ajoutez un produit ↓</td></tr>
        </tbody>
      </table>
    </div>
    <div class="dlc-form">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;gap:8px;">
          <input type="text" id="dlc-name" placeholder="Nom du produit..." style="flex:1">
          <input type="text" id="dlc-gr" placeholder="Gr." style="width:60px;text-align:center">
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="date" id="dlc-date" style="flex:1;background:#fff">
          <button class="add-btn" onclick="addDLC()" style="padding:11px 18px">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- COMMANDE -->
<div class="page" id="page-cmd">
  <div class="section" style="margin-top:0">
    <div class="list-head">📦 À commander <span class="list-badge" id="cmd-count">0</span></div>
    <div class="list-body" id="cmd-list"></div>
    <div class="add-form">
      <input type="text" id="cmd-name" placeholder="Produit...">
      <input type="number" id="cmd-qty" placeholder="Qté" style="width:80px">
      <button class="add-btn" onclick="addCmd()">+</button>
    </div>
  </div>
</div>

<!-- TÂCHES -->
<div class="page" id="page-task">
  <div class="section" style="margin-top:0">
    <div class="list-head">✅ À faire <span class="list-badge" id="todo-count">0</span></div>
    <div class="list-body" id="todo-list"></div>
    <div class="add-form">
      <input type="text" id="todo-name" placeholder="Ajouter une tâche...">
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="goPage('home',this)"><div class="ic">🏠</div>Accueil</button>
  <button onclick="goPage('tabac',this)"><div class="ic">🚬</div>Tabac</button>
  <button onclick="goPage('plan',this)"><div class="ic">📅</div>Planning</button>
  <button onclick="goPage('boul',this)"><div class="ic">🥐</div>Boul.</button>
  <button onclick="goPage('dlc',this)"><div class="ic">⏱️</div>DLC</button>
  <button onclick="goPage('cmd',this)"><div class="ic">📦</div>Commande</button>
  <button onclick="goPage('task',this)"><div class="ic">✅</div>Tâches</button>
</div>

<!-- RECAP -->
<div class="recap-overlay" id="recap-overlay">
  <div class="sheet">
    <h3>📋 À corriger</h3>
    <p>Ce qui n’est pas exact dans le tabac</p>
    <div id="recap-list"></div>
    <button class="btn-full" onclick="$('recap-overlay').classList.remove('open')">Fermer</button>
  </div>
</div>

<script>
const LS = {
  tabac:"mb_tabac_v4",

function $(id){ return document.getElementById(id); }
function readJSON(key, fallback){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
function writeJSON(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}
function today0(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}
function todayISO(){ return new Date().toISOString(); }
function fmtHeaderDate(d){
  const days = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const months = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function fmtFullDate(d){
  const days = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const months = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function toHH(h){
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return hh + "h" + (mm > 0 ? String(mm).padStart(2,"0") : "00");
}
function mondayIndex(d){
  return (d.getDay() + 6) % 7; // Lun=0 ... Dim=6
}

function getTabacStock(name){ return tabacStock[name] ?? 0; }
function setTabacStock(name, val){ tabacStock[name] = Math.max(0, val); writeJSON(LS.tabac, tabacStock); }

function tabacStatus(cur, cap){
  if(cur === cap) return {cls:"ok", txt:"✅ OK"};
  if(cur === 0) return {cls:"bad", txt:"🔴 Vide"};
  if(cur < cap) return {cls:"warn", txt:"⚠️ -" + (cap - cur)};
  return {cls:"over", txt:"❌ +" + (cur - cap)};
}

function resetAllTabac(){
  if(!confirm("Remettre tout le tabac à sa capacité ?")) return;
  tabacGroups.forEach(g=>{
    g.sections.forEach(s=>{
      s.items.forEach(item=>tabacStock[item.m] = item.cap);
    });
  });
  writeJSON(LS.tabac, tabacStock);
  renderTabac();
  renderHome();
  renderTabacSearch();
}

function resetTabacGroup(groupIndex){
  if(!confirm("Remettre ce tiroir à sa capacité ?")) return;
  const g = tabacGroups[groupIndex];
  g.sections.forEach(s=>s.items.forEach(item=>tabacStock[item.m] = item.cap));
  writeJSON(LS.tabac, tabacStock);
  renderTabac();
  renderHome();
  renderTabacSearch();
}

function tabacDelta(name, delta){
  tabacStock[name] = Math.max(0, (tabacStock[name] ?? 0) + delta);
  writeJSON(LS.tabac, tabacStock);
  renderTabac();
  renderHome();
  renderTabacSearch();
}

function renderTabac(){
  const mount = $("tabac-sections");
  let html = "";
  tabacGroups.forEach((g, gi)=>{
    html += `<div class="section">
      <div class="section-head">${g.title} <button class="btn-reset" onclick="resetTabacGroup(${gi})">↺ Reset</button></div>
      <div class="section-body">
        <table>
          <thead>
            <tr>
              <th>Marque</th>
              <th>Emplacement</th>
              <th style="width:120px;text-align:center">Stock</th>
              <th style="width:80px;text-align:center">Statut</th>
            </tr>
          </thead>
          <tbody>`;
    g.sections.forEach(sec=>{
      if(sec.label){
        html += `<tr class="sep-row"><td colspan="4">${sec.label}</td></tr>`;
      }
      sec.items.forEach(item=>{
        const cur = getTabacStock(item.m);
        const st = tabacStatus(cur, item.cap);
        const place = sec.label ? `${g.short} · ${sec.label}` : g.short;
        html += `<tr>
          <td class="nom">${item.m}</td>
          <td class="place">${place}</td>
          <td class="ctrl">
            <div class="ctrl-wrap">
              <button class="ctrl-btn" onclick="tabacDelta('${encodeURIComponent(item.m)}',-1)">−</button>
              <span class="ctrl-num ${st.cls}">${cur}</span>
              <button class="ctrl-btn" onclick="tabacDelta('${encodeURIComponent(item.m)}',1)">+</button>
            </div>
          </td>
          <td class="stat ${st.cls}">${st.txt}</td>
        </tr>`;
      });
    });
    html += `</tbody></table></div></div>`;
  });
  mount.innerHTML = html;
}

function renderTabacSearch(){
  const q = $("tabac-search").value.trim().toLowerCase();
  const box = $("search-results");
  if(!q){ box.style.display = "none"; box.innerHTML = ""; return; }

  const results = [];
  tabacGroups.forEach(g=>{
    g.sections.forEach(sec=>{
      sec.items.forEach(item=>{
        const place = sec.label ? `${g.short} ${sec.label}` : g.short;
        if(item.m.toLowerCase().includes(q) || place.toLowerCase().includes(q)) results.push({item, g, sec, place});
      });
    });
  });

  if(!results.length){
    box.style.display = "block";
    box.innerHTML = `<div class="empty-msg">Aucun résultat</div>`;
    return;
  }

  let html = `<table>
    <thead>
      <tr>
        <th>Marque</th>
        <th>Emplacement</th>
        <th style="width:120px;text-align:center">Stock</th>
        <th style="width:80px;text-align:center">Statut</th>
      </tr>
    </thead><tbody>`;

  results.forEach(r=>{
    const cur = getTabacStock(r.item.m);
    const st = tabacStatus(cur, r.item.cap);
    html += `<tr>
      <td class="nom">${r.item.m}</td>
      <td class="place">${r.place}</td>
      <td class="ctrl">
        <div class="ctrl-wrap">
          <button class="ctrl-btn" onclick="tabacDelta('${encodeURIComponent(r.item.m)}',-1)">−</button>
          <span class="ctrl-num ${st.cls}">${cur}</span>
          <button class="ctrl-btn" onclick="tabacDelta('${encodeURIComponent(r.item.m)}',1)">+</button>
        </div>
      </td>
      <td class="stat ${st.cls}">${st.txt}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  box.style.display = "block";
  box.innerHTML = html;
}

function openRecap(){
  const items = [];
  tabacGroups.forEach(g=>{
    g.sections.forEach(s=>{
      s.items.forEach(item=>{
        const cur = getTabacStock(item.m);
        if(cur !== item.cap){
          items.push({m:item.m, cur, cap:item.cap});
        }
      });
    });
  });
  let html = "";
  if(!items.length){
    html = `<div class="empty-msg" style="color:var(--green);font-weight:800;font-size:15px">✅ Tout est exact</div>`;
  }else{
    items.forEach(x=>{
      html += `<div class="recap-row">
        <span class="recap-nom">${x.m} <span class="small-muted">(${x.cur}/${x.cap})</span></span>
        <span class="recap-qty">${x.cur < x.cap ? "+" : "-"}${Math.abs(x.cap - x.cur)}</span>
      </div>`;
    });
  }
  $("recap-list").innerHTML = html;
  $("recap-overlay").classList.add("open");
}

let currentWeekOffset = 0;
let currentDayIdx = mondayIndex(new Date());

function getWeekDates(offset){
  const now = new Date();
  const mon = new Date(now);
  const dow = now.getDay(); // Sun=0
  const diffToMon = dow === 0 ? 6 : dow - 1;
  mon.setDate(now.getDate() - diffToMon + offset * 7);
  mon.setHours(0,0,0,0);
  const arr = [];
  for(let i=0;i<7;i++){
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    arr.push(d);
  }
  return arr;
}

function changeWeek(dir){
  currentWeekOffset += dir;
  renderPlan();
}

function selectDay(idx){
  currentDayIdx = idx;
  document.querySelectorAll(".day-pill").forEach((p,i)=>p.classList.toggle("active", i===idx));
  renderPlan();
}

function renderPlan(){
  const dates = getWeekDates(currentWeekOffset);
  $("week-label").textContent = `${dates[0].getDate()} ${dates[0].toLocaleDateString('fr',{month:'short'})} — ${dates[6].getDate()} ${dates[6].toLocaleDateString('fr',{month:'short'})}`;

  const short = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  let daysHtml = "";
  dates.forEach((d,i)=>{
    const isToday = today0().toDateString() === d.toDateString();
    daysHtml += `<div class="day-pill ${i===currentDayIdx ? "active" : ""} ${isToday ? "today" : ""}" onclick="selectDay(${i})">
      <div class="dp">${short[i]}</div><div class="dd">${d.getDate()}</div>
    </div>`;
  });
  $("days-scroll").innerHTML = daysHtml;

  const current = dates[currentDayIdx];
  const dayKey = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][current.getDay()];
  const dayPlan = PLAN[dayKey] || {};
  const S = 6, E = 21, TOT = E - S;
  const ticks = [];
  for(let h=S; h<=E; h+=2) ticks.push(`${h}h`);

  let html = `<div class="timeline-box"><div class="tl-inner">
    <div class="tl-header">${ticks.map(t=>`<div class="tl-tick">${t}</div>`).join("")}</div>`;

  EMP.forEach(emp=>{
    const sh = dayPlan[emp.id];
    html += `<div class="tl-row">
      <div class="tl-name">${emp.nom.split(" ")[0]}</div>
      <div class="tl-track">`;
    if(sh){
      const l = ((sh[0]-S)/TOT)*100;
      const w = ((sh[1]-sh[0])/TOT)*100;
      html += `<div class="tl-bar" style="left:${l}%;width:${w}%;background:${emp.color}">${toHH(sh[0])}–${toHH(sh[1])}</div>`;
    }
    html += `</div></div>`;
  });

  html += `</div></div>`;

  const present = EMP.filter(emp=>dayPlan[emp.id]);
  if(present.length){
    html += `<div class="team-list">`;
    present.forEach(emp=>{
      const sh = dayPlan[emp.id];
      html += `<div class="team-row">
        <div class="team-av" style="background:${emp.color}">${emp.initials}</div>
        <div class="team-info">
          <div class="team-nom">${emp.nom}${emp.toi ? '<span class="toi-tag">TOI</span>' : ''}</div>
          <div class="team-hrs">${toHH(sh[0])} → ${toHH(sh[1])}</div>
        </div>
        <div class="team-start">${toHH(sh[0])}</div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty-msg">Personne ce jour</div>`;
  }

  html += `<div class="hours-box">
    <div class="hours-title">Total heures semaine</div>`;
  EMP.forEach(emp=>{
    let total = 0;
    Object.keys(PLAN).forEach(k=>{
      const sh = PLAN[k][emp.id];
      if(sh) total += sh[1] - sh[0];
    });
    if(total > 0){
      html += `<div class="hours-row"><span class="hours-nom">${emp.nom}</span><span class="hours-val">${total.toFixed(1)}h</span></div>`;
    }
  });
  html += `</div>`;

  $("plan-content").innerHTML = html;
}
renderPlan();

let boulData = readJSON(LS.boul, null);
if(!boulData){
  boulData = BOUL_DEF.map(x=>({
    ...x,
    qte:x.std,
    date:todayISO(),
    destroyed:false
  }));
  writeJSON(LS.boul, boulData);
}

function saveBoul(){ writeJSON(LS.boul, boulData); }

function newDayBoul(){
  if(!confirm("Nouveau jour ? Remettre les produits quotidiens au standard.")) return;
  boulData.forEach(item=>{
    if(item.kind === "daily"){
      item.qte = item.std;
      item.date = todayISO();
      item.destroyed = false;
    }
    if(!item.date) item.date = todayISO();
  });
  saveBoul();
  renderBoul();
  renderHome();
}

function boulDelta(i, delta){
  const item = boulData[i];
  if(item.destroyed) item.destroyed = false;
  item.qte = Math.max(0, item.qte + delta);
  if(!item.date) item.date = todayISO();
  saveBoul();
  renderBoul();
  renderHome();
}

function toggleDestroyBoul(i){
  const item = boulData[i];
  item.destroyed = !item.destroyed;
  if(item.destroyed){
    item.qte = 0;
  }else{
    item.qte = item.std;
    item.date = todayISO();
  }
  saveBoul();
  renderBoul();
  renderHome();
}

function bowlDaysSince(dateStr){
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.round((today0() - d) / (1000*60*60*24));
}

function renderBoul(){
  let refill = [];
  let destroy = [];
  let cards = "";

  boulData.forEach((item, i)=>{
    const isExpired = item.kind === "dated" && item.date && bowlDaysSince(item.date) >= 3;
    const isLow = !item.destroyed && item.qte < item.std;
    const isDestroy = item.destroyed || isExpired;

    if(isLow) refill.push({item,i});
    if(isDestroy) destroy.push({item,i,expired:isExpired});

    const cls = isDestroy ? "red" : (isLow ? "orange" : "green");
    const tag = item.kind === "daily"
      ? "Quotidien"
      : (item.date ? "Date : " + new Date(item.date).toLocaleDateString('fr') : "Sans date");

    cards += `<div class="boul-card ${cls}">
      <div class="boul-emoji">${item.emoji}</div>
      <div class="boul-nom">${item.nom}</div>
      <div class="boul-ctrl">
        <button class="boul-btn" onclick="boulDelta(${i},-1)">−</button>
        <span class="boul-num">${item.qte}</span>
        <button class="boul-btn" onclick="boulDelta(${i},1)">+</button>
      </div>
      <div class="boul-sub">${item.qte} / ${item.std}</div>
      <div class="boul-meta">${tag}</div>
      <button class="boul-destroy-btn ${isDestroy ? "on" : "off"}" onclick="toggleDestroyBoul(${i})">
        ${isDestroy ? "✓ Détruit" : "🗑️ Détruire"}
      </button>
    </div>`;
  });

  $("boul-grid").innerHTML = cards;

  $("boul-alert").style.display = destroy.length ? "block" : "none";
  $("boul-alert").innerHTML = destroy.length ? "⚠️ À détruire : " + destroy.map(x=>x.item.nom).join(", ") : "";

  $("boul-refill-count").textContent = refill.length;
  $("boul-destroy-count").textContent = destroy.length;

  $("boul-refill-list").innerHTML = refill.length
    ? refill.map(x=>`<div class="list-row"><div class="list-txt">${x.item.emoji} ${x.item.nom} → remettre ${x.item.std - x.item.qte}</div></div>`).join("")
    : `<div class="empty-msg">Rien à remettre 👍</div>`;

  $("boul-destroy-list").innerHTML = destroy.length
    ? destroy.map(x=>`<div class="list-row ${x.item.destroyed ? "done" : ""}"><div class="list-chk">${x.item.destroyed ? "✓" : "!"}</div><div class="list-txt">${x.item.emoji} ${x.item.nom} ${x.expired ? "<span class='small-muted'>(date dépassée)</span>" : "<span class='small-muted'>(marqué)</span>"}</div></div>`).join("")
    : `<div class="empty-msg">Rien à détruire 👍</div>`;
}
renderBoul();

/* =========================
   DLC
========================= */
let dlcData = readJSON(LS.dlc, []);

function saveDLC(){ writeJSON(LS.dlc, dlcData); }

function addDLC(){
  const name = $("dlc-name").value.trim();
  const gr = $("dlc-gr").value.trim();
  const date = $("dlc-date").value;
  if(!name || !date){ alert("Entrez le nom et la date."); return; }
  dlcData.unshift({name, gr:gr || "-", date, retired:false});
  $("dlc-name").value = "";
  $("dlc-gr").value = "";
  $("dlc-date").value = "";
  saveDLC();
  renderDLC();
  renderHome();
}

function toggleRetireDLC(i){
  dlcData[i].retired = !dlcData[i].retired;
  saveDLC();
  renderDLC();
  renderHome();
}

function delDLC(i){
  dlcData.splice(i,1);
  saveDLC();
  renderDLC();
  renderHome();
}

function renderDLC(){
  const now = today0();
  const sorted = dlcData.map((d,i)=>({i,...d})).sort((a,b)=>new Date(a.date)-new Date(b.date));

  let red = [];
  let orange = [];
  let urgent = 0;
  let html = "";

  if(!sorted.length){
    html = `<tr><td colspan="4" class="empty-msg">Ajoutez un produit ↓</td></tr>`;
  }else{
    sorted.forEach(item=>{
      const exp = new Date(item.date);
      exp.setHours(0,0,0,0);
      const diff = Math.round((exp - now) / (1000*60*60*24));

      let tag = `<span class="tag-ok">✅ ${diff}j</span>`;
      if(item.retired){
        tag = `<span class="tag-ok">✓ Retiré</span>`;
      }else if(diff < 0){
        tag = `<span class="tag-red">🔴 ${Math.abs(diff)}j</span>`;
        red.push(item.name);
        urgent++;
      }else if(diff === 0){
        tag = `<span class="tag-red">🔴 Auj.</span>`;
        red.push(item.name);
        urgent++;
      }else if(diff === 1){
        tag = `<span class="tag-ora">🟡 Demain</span>`;
        orange.push(item.name);
        urgent++;
      }else if(diff <= 3){
        tag = `<span class="tag-ora">🟡 ${diff}j</span>`;
      }

      const dateStr = item.date.slice(8,10) + "/" + item.date.slice(5,7);

      html += `<tr style="${item.retired ? "opacity:.45" : ""}">
        <td class="nom" style="${item.retired ? "text-decoration:line-through" : ""}">${item.name}</td>
        <td style="text-align:center;color:var(--muted);font-size:11px">${item.gr}</td>
        <td style="text-align:center;font-size:11px">${dateStr}</td>
        <td style="text-align:center">
          ${tag}
          <div style="margin-top:3px;display:flex;justify-content:center;gap:8px">
            <span onclick="event.stopPropagation(); toggleRetireDLC(${item.i})" style="font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline">${item.retired ? "Annuler" : "Retirer"}</span>
            <span onclick="event.stopPropagation(); delDLC(${item.i})" style="font-size:10px;color:var(--red);cursor:pointer">✕</span>
          </div>
        </td>
      </tr>`;
    });
  }

  $("dlc-body").innerHTML = html;
  $("dlc-badge").textContent = urgent;
  $("dlc-red").style.display = red.length ? "block" : "none";
  $("dlc-red").innerHTML = red.length ? "🔴 À retirer maintenant : " + red.join(", ") : "";
  $("dlc-ora").style.display = orange.length ? "block" : "none";
  $("dlc-ora").innerHTML = orange.length ? "🟡 À retirer demain : " + orange.join(", ") : "";
}
renderDLC();

/* =========================
   COMMANDE MANUELLE
========================= */
let cmdData = readJSON(LS.cmd, []);

function saveCmd(){ writeJSON(LS.cmd, cmdData); }

function addCmd(){
  const name = $("cmd-name").value.trim();
  const qty = $("cmd-qty").value.trim();
  if(!name || !qty) return;
  cmdData.unshift({name, qty});
  $("cmd-name").value = "";
  $("cmd-qty").value = "";
  saveCmd();
  renderCmd();
  renderHome();
}

function delCmd(i){
  cmdData.splice(i,1);
  saveCmd();
  renderCmd();
  renderHome();
}

function renderCmd(){
  $("cmd-count").textContent = cmdData.length;
  $("cmd-list").innerHTML = cmdData.length
    ? cmdData.map((c,i)=>`
        <div class="list-row">
          <div class="list-txt">${c.name} (x${c.qty})</div>
          <div class="cmd-delete" onclick="event.stopPropagation(); delCmd(${i})">✕</div>
        </div>
      `).join("")
    : `<div class="empty-msg">Rien à commander 👍</div>`;
}
renderCmd();

/* =========================
   TÂCHES
========================= */
let todoData = readJSON(LS.todo, []);

function saveTodo(){ writeJSON(LS.todo, todoData); }

function addTodo(){
  const txt = $("todo-name").value.trim();
  if(!txt) return;
  todoData.unshift({txt, done:false});
  $("todo-name").value = "";
  saveTodo();
  renderTodo();
  renderHome();
}

function toggleTodo(i){
  todoData[i].done = !todoData[i].done;
  saveTodo();
  renderTodo();
  renderHome();
}

function delTodo(i){
  todoData.splice(i,1);
  saveTodo();
  renderTodo();
  renderHome();
}

function renderTodo(){
  $("todo-count").textContent = todoData.filter(x=>!x.done).length;
  $("todo-list").innerHTML = todoData.length
    ? todoData.map((t,i)=>`
      <div class="list-row ${t.done ? "done" : ""}" onclick="toggleTodo(${i})">
        <div class="list-chk">${t.done ? "✓" : ""}</div>
        <div class="list-txt">${t.txt}</div>
        <div class="task-delete" onclick="event.stopPropagation(); delTodo(${i})">✕</div>
      </div>
    `).join("")
    : `<div class="empty-msg">Rien pour l'instant</div>`;
}
renderTodo();

/* =========================
   HOME
========================= */
function renderHome(){
  const now = today0();

  let tabLow = 0, tabOver = 0;
  tabacGroups.forEach(g=>{
    g.sections.forEach(s=>{
      s.items.forEach(item=>{
        const cur = getTabacStock(item.m);
        if(cur < item.cap) tabLow++;
        if(cur > item.cap) tabOver++;
      });
    });
  });
  const tabIssues = tabLow + tabOver;

  let boulRefill = 0, boulDestroy = 0;
  boulData.forEach(item=>{
    const expired = item.kind === "dated" && item.date && bowlDaysSince(item.date) >= 3;
    if(!item.destroyed && item.qte < item.std) boulRefill++;
    if(item.destroyed || expired) boulDestroy++;
  });
  const boulIssues = boulRefill + boulDestroy;

  let dlcSoon = 0, dlcUrgent = 0;
  dlcData.forEach(item=>{
    if(item.retired) return;
    const exp = new Date(item.date);
    exp.setHours(0,0,0,0);
    const diff = Math.round((exp - now) / (1000*60*60*24));
    if(diff <= 0) dlcUrgent++;
    else if(diff === 1) dlcSoon++;
  });

  const cmdCount = cmdData.length;
  const todoRem = todoData.filter(x=>!x.done).length;

  function cardClass(value, type){
    if(type === "tabac"){
      if(tabOver > 0) return "red";
      if(tabLow > 0) return "orange";
      return "green";
    }
    if(type === "boul"){
      if(boulDestroy > 0) return "red";
      if(boulRefill > 0) return "orange";
      return "green";
    }
    if(type === "dlc"){
      if(dlcUrgent > 0) return "red";
      if(dlcSoon > 0) return "orange";
      return "green";
    }
    if(type === "cmd") return value > 0 ? "blue" : "green";
    if(type === "todo") return value > 0 ? "orange" : "green";
    return "green";
  }

  let cards = "";
  cards += `<div class="stat-card ${cardClass(tabIssues,"tabac")}">
    <div class="stat-icon">🚬</div>
    <div class="stat-label">Tabac</div>
    <div class="stat-val">${tabIssues}</div>
    <div class="stat-sub">${tabIssues > 0 ? "à corriger" : "Tout exact"}</div>
  </div>`;

  cards += `<div class="stat-card ${cardClass(boulIssues,"boul")}">
    <div class="stat-icon">🥐</div>
    <div class="stat-label">Boulangerie</div>
    <div class="stat-val">${boulIssues}</div>
    <div class="stat-sub">${boulIssues > 0 ? "à remettre / jeter" : "OK"}</div>
  </div>`;

  cards += `<div class="stat-card ${cardClass(dlcSoon + dlcUrgent,"dlc")}">
    <div class="stat-icon">⏱️</div>
    <div class="stat-label">DLC</div>
    <div class="stat-val">${dlcSoon + dlcUrgent}</div>
    <div class="stat-sub">${dlcUrgent > 0 ? "urgent" : (dlcSoon > 0 ? "demain" : "OK")}</div>
  </div>`;

  cards += `<div class="stat-card ${cardClass(cmdCount,"cmd")}">
    <div class="stat-icon">📦</div>
    <div class="stat-label">Commande</div>
    <div class="stat-val">${cmdCount}</div>
    <div class="stat-sub">liste manuelle</div>
  </div>`;

  cards += `<div class="stat-card ${cardClass(todoRem,"todo")}">
    <div class="stat-icon">✅</div>
    <div class="stat-label">Tâches</div>
    <div class="stat-val">${todoRem}</div>
    <div class="stat-sub">${todoRem > 0 ? "à faire" : "tout fait"}</div>
  </div>`;

  $("home-cards").innerHTML = cards;

  let actions = "";

  if(tabIssues > 0){
    const list = [];
    tabacGroups.forEach(g=>{
      g.sections.forEach(s=>{
        s.items.forEach(item=>{
          const cur = getTabacStock(item.m);
          if(cur !== item.cap) list.push(`${item.m} (${cur}/${item.cap})`);
        });
      });
    });
    actions += `<div class="action-row"><div class="dot red"></div><div class="action-text">Tabac à corriger</div><span class="badge red">${list.length}</span></div>`;
  }

  if(boulRefill > 0){
    actions += `<div class="action-row"><div class="dot orange"></div><div class="action-text">Boulangerie à remettre</div><span class="badge orange">${boulRefill}</span></div>`;
  }

  if(boulDestroy > 0){
    actions += `<div class="action-row"><div class="dot red"></div><div class="action-text">Boulangerie à détruire</div><span class="badge red">${boulDestroy}</span></div>`;
  }

  if(dlcUrgent > 0){
    actions += `<div class="action-row"><div class="dot red"></div><div class="action-text">DLC à retirer maintenant</div><span class="badge red">${dlcUrgent}</span></div>`;
  }else if(dlcSoon > 0){
    actions += `<div class="action-row"><div class="dot orange"></div><div class="action-text">DLC à retirer demain</div><span class="badge orange">${dlcSoon}</span></div>`;
  }

  cmdData.slice(0,3).forEach(c=>{
    actions += `<div class="action-row"><div class="dot green"></div><div class="action-text">${c.name} (x${c.qty})</div></div>`;
  });

  todoData.filter(x=>!x.done).slice(0,3).forEach(t=>{
    actions += `<div class="action-row"><div class="dot green"></div><div class="action-text">${t.txt}</div></div>`;
  });

  if(!actions){
    actions = `<div class="empty-msg">✅ Tout est bon</div>`;
  }

  $("home-actions").innerHTML = actions;

  const todayKey = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"][new Date().getDay()];
  const dayPlan = PLAN[todayKey] || {};
  let team = "";
  EMP.forEach(emp=>{
    const sh = dayPlan[emp.id];
    if(sh){
      team += `<div class="action-row">
        <div style="width:32px;height:32px;border-radius:8px;background:${emp.color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none">${emp.initials}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:800">${emp.nom}${emp.toi ? '<span class="toi-tag">TOI</span>' : ""}</div>
          <div class="small-muted">${toHH(sh[0])} → ${toHH(sh[1])}</div>
        </div>
        <div style="font-size:13px;font-weight:800;color:var(--green)">${toHH(sh[0])}</div>
      </div>`;
    }
  });
  if(!team) team = `<div class="empty-msg">Personne aujourd’hui</div>`;
  $("home-team").innerHTML = team;
}

/* SAVE ALL */
function saveAll(){
  writeJSON(LS.tabac, tabacStock);
  writeJSON(LS.boul, boulData);
  writeJSON(LS.dlc, dlcData);
  writeJSON(LS.cmd, cmdData);
  writeJSON(LS.todo, todoData);
}
setInterval(saveAll, 5000);
window.addEventListener("beforeunload", saveAll);

/* INITIAL */
renderHome();
</script>
</body>
</html>
