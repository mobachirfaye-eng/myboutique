<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MyBoutique</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:10px}
h2{margin-top:20px}
.box{background:white;padding:10px;margin-bottom:15px;border-radius:10px}

/* TABAC */
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
button{padding:4px 8px;margin-left:5px}

/* STATUS */
.red{color:red}
.orange{color:orange}
.green{color:green}

/* PLANNING */
.plan-row{margin-bottom:10px}
.bar{height:20px;border-radius:5px;margin-top:5px;color:white;font-size:10px;text-align:center}
</style>
</head>
<body>

<h1>MyBoutique</h1>

<!-- TABAC -->
<h2>🚬 Tabac</h2>
<div class="box" id="tabac"></div>

<h3>📦 Réserve</h3>
<div class="box" id="reserve"></div>

<!-- COMMANDE -->
<h2>🛒 Commande</h2>
<div class="box" id="commande"></div>

<!-- BOULANGERIE -->
<h2>🥐 Boulangerie</h2>
<div class="box" id="boul"></div>

<h3>🗑️ Destruction</h3>
<div class="box" id="destroy"></div>

<!-- PLANNING -->
<h2>📅 Planning</h2>
<div class="box" id="planning"></div>

<script>

// ================= TABAC =================
let tabac=[
{nom:"Marlboro Red",cap:5,stock:5},
{nom:"Marlboro Gold",cap:5,stock:5},
{nom:"Winston",cap:5,stock:5},
{nom:"Camel",cap:4,stock:4},
]

let reserve=[
"Dunhill","Corset","LM","News"
]

let commande=[]

function renderTabac(){
let html=""
tabac.forEach((t,i)=>{
let status=""
if(t.stock==0) status="red"
else if(t.stock<t.cap) status="orange"
else status="green"

html+=`
<div class="row">
<div class="${status}">${t.nom} (${t.stock}/${t.cap})</div>
<div>
<button onclick="change(${i},-1)">-</button>
<button onclick="change(${i},1)">+</button>
${t.stock<t.cap?`<button onclick="addCmd(${i})">🛒</button>`:""}
</div>
</div>`
})
document.getElementById("tabac").innerHTML=html
}

function change(i,v){
tabac[i].stock+=v
if(tabac[i].stock<0)tabac[i].stock=0
renderTabac()
}

function addCmd(i){
let t=tabac[i]
let manque=t.cap-t.stock
commande.push({nom:t.nom,qty:manque,statut:0})
renderCmd()
}

// ================= RESERVE =================
function renderReserve(){
let html=""
reserve.forEach(r=>html+=`<div>${r}</div>`)
document.getElementById("reserve").innerHTML=html
}

// ================= COMMANDE =================
function renderCmd(){
let html=""
commande.forEach((c,i)=>{
let statut=["🔴","🟡","✅"][c.statut]
html+=`
<div class="row">
<div>${c.nom} x${c.qty}</div>
<div>
<button onclick="next(${i})">${statut}</button>
<button onclick="del(${i})">X</button>
</div>
</div>`
})
document.getElementById("commande").innerHTML=html
}

function next(i){
if(commande[i].statut<2)commande[i].statut++
renderCmd()
}
function del(i){
commande.splice(i,1)
renderCmd()
}

// ================= BOULANGERIE =================
let boul=[
{nom:"Croissant",stock:6},
{nom:"Pain choco",stock:8},
{nom:"Pain raisin",stock:4}
]

let destroyList=[]

function renderBoul(){
let html=""
boul.forEach((b,i)=>{
html+=`
<div class="row">
<div>${b.nom} (${b.stock})</div>
<div>
<button onclick="bChange(${i},-1)">-</button>
<button onclick="bChange(${i},1)">+</button>
<button onclick="destroy(${i})">🗑️</button>
</div>
</div>`
})
document.getElementById("boul").innerHTML=html
}

function bChange(i,v){
boul[i].stock+=v
if(boul[i].stock<0)boul[i].stock=0
renderBoul()
}

function destroy(i){
let b=boul[i]
destroyList.push({nom:b.nom,qty:b.stock})
b.stock=0
renderBoul()
renderDestroy()
}

function renderDestroy(){
let html=""
let total=0
destroyList.forEach(d=>{
total+=d.qty
html+=`<div>${d.nom} x${d.qty}</div>`
})
html+=`<hr>Total: ${total}`
document.getElementById("destroy").innerHTML=html
}

// ================= PLANNING =================
let plan={
"Bachir":[[11,16],[17,20]],
"Badrou":[[6,13]],
"Dame":[[16,20]],
"Karim":[[12,18]]
}

function renderPlanning(){
let html=""
Object.keys(plan).forEach(name=>{
html+=`<div class="plan-row"><b>${name}</b>`
plan[name].forEach(s=>{
let left=(s[0]-6)*10
let width=(s[1]-s[0])*10
html+=`<div class="bar" style="margin-left:${left}px;width:${width}px;background:red">
${s[0]}-${s[1]}
</div>`
})
html+="</div>"
})
document.getElementById("planning").innerHTML=html
}

// INIT
renderTabac()
renderReserve()
renderCmd()
renderBoul()
renderDestroy()
renderPlanning()

</script>
</body>
</html>
