<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBoutique</title>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f7}
.header{background:#E8192C;color:#fff;padding:12px;font-weight:bold}
.page{display:none;padding:12px}
.page.active{display:block}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff;border-top:1px solid #ddd}
.nav button{flex:1;padding:10px;border:none;background:none;font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.bad{color:red}
.warn{color:orange}
.ok{color:green}
</style>
</head>

<body>

<div class="header">MyBoutique</div>

<div id="home" class="page active"></div>
<div id="tabac" class="page"></div>
<div id="cmd" class="page"></div>
<div id="boul" class="page"></div>

<div class="nav">
<button onclick="go('home')">🏠</button>
<button onclick="go('tabac')">🚬</button>
<button onclick="go('cmd')">🛒</button>
<button onclick="go('boul')">🥐</button>
</div>

<script>

// NAV
function go(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'))
document.getElementById(p).classList.add('active')
renderAll()
}

// ===== DATA =====
let tabac=[
{name:"Marlboro Red",cap:5,stock:5},
{name:"Marlboro Gold",cap:5,stock:5},
{name:"Winston",cap:5,stock:3},
{name:"Camel",cap:4,stock:4}
]

let reserve=[
"Dunhill","Corset","LM","News"
]

let cmd=[]
let boul=[
{name:"Croissant",q:6,std:6},
{name:"Pain choco",q:8,std:8},
{name:"Pain raisin",q:4,std:4}
]

let dest=[]

// ===== TABAC =====
function renderTabac(){
let h="<h3>🚬 Tabac</h3>"

tabac.forEach((t,i)=>{
let st="ok"
if(t.stock==0)st="bad"
else if(t.stock<t.cap)st="warn"

h+=`
<div class="card">
<div class="row">
<b>${t.name}</b>
<span class="${st}">${t.stock}/${t.cap}</span>
</div>

<div class="row">
<button onclick="chg(${i},-1)">-</button>
<button onclick="chg(${i},1)">+</button>
<button onclick="addCmd('${t.name}',${t.cap-t.stock})">🛒</button>
</div>
</div>`
})

h+="<h3>📦 Réserve</h3>"
reserve.forEach(r=>{
h+=`<div class="card">${r}</div>`
})

document.getElementById("tabac").innerHTML=h
}

function chg(i,d){
tabac[i].stock+=d
if(tabac[i].stock<0)tabac[i].stock=0
renderAll()
}

// ===== COMMANDE =====
function addCmd(n,q){
if(q<=0)return
cmd.push({n,q,st:0})
renderAll()
}

function renderCmd(){
let h="<h3>🛒 Commande</h3>"

cmd.forEach((c,i)=>{
let txt=["🔴 à commander","🟡 commandé","🟢 reçu"][c.st]

h+=`
<div class="card">
${c.n} x${c.q}
<button onclick="next(${i})">${txt}</button>
</div>`
})

h+=`
<div class="card">
<input id="n" placeholder="produit">
<input id="q" type="number" placeholder="qté">
<button onclick="addManual()">+</button>
</div>
`

document.getElementById("cmd").innerHTML=h
}

function next(i){
if(cmd[i].st<2)cmd[i].st++
renderAll()
}

function addManual(){
let n=document.getElementById("n").value
let q=parseInt(document.getElementById("q").value)||1
if(!n)return
cmd.push({n,q,st:0})
renderAll()
}

// ===== BOULANGERIE =====
function renderBoul(){
let h="<h3>🥐 Boulangerie</h3>"

boul.forEach((b,i)=>{
h+=`
<div class="card">
${b.name} (${b.q})
<button onclick="bchg(${i},-1)">-</button>
<button onclick="bchg(${i},1)">+</button>
<button onclick="destroy(${i})">🗑️</button>
</div>`
})

h+="<h3>🗑️ Destruction</h3>"

let total=0
dest.forEach(d=>{
total+=d.q
h+=`<div>${d.name} x${d.q}</div>`
})

h+=`<div class="card">Total: ${total}</div>`

document.getElementById("boul").innerHTML=h
}

function bchg(i,d){
boul[i].q+=d
if(boul[i].q<0)boul[i].q=0
renderAll()
}

function destroy(i){
dest.push({name:boul[i].name,q:boul[i].q})
boul[i].q=0
renderAll()
}

// ===== HOME =====
function renderHome(){
let manque=tabac.filter(t=>t.stock<t.cap).length
let h=""

h+=`<div class="card">🚬 Manque tabac: ${manque}</div>`
h+=`<div class="card">🛒 Commande: ${cmd.length}</div>`
h+=`<div class="card">🗑️ Destruction: ${dest.length}</div>`

document.getElementById("home").innerHTML=h
}

// ===== GLOBAL =====
function renderAll(){
renderHome()
renderTabac()
renderCmd()
renderBoul()
}

// INIT
renderAll()

</script>

</body>
</html>
