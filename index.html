<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />

<title>MyBoutique — Relay Montparnasse</title>
<style>
:root{
  --red:#E8192C;

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
body{padding:12px 12px 30px;-webkit-tap-highlight-color:transparent}
button,input,select{font:inherit}
button{cursor:pointer}
h1{margin:4px 0 4px;font-size:22px}
.top-sub{font-size:12px;color:var(--muted);margin-bottom:10px}

.sec{margin:0 0 14px}
.sec-h{

.sec-b{

.search-row{display:flex;gap:8px;margin-bottom:10px}

.btn-valid{

.cmd-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid #f3f4f6}

.plan-top{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px;gap:8px}
.plan-top button{border:none;background:var(--red);color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:800}

}
.day-btn.on{border-color:var(--red);border-width:2px;color:var(--red);background:#fff5f5}
.day-btn .d1{font-size:9px;text-transform:uppercase;margin-bottom:2px}

.plan-box{

}
.timeline{

}
.tl-head{display:flex;padding-left:76px;margin-bottom:8px}

.tot-box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px}

<body>

<h1>MyBoutique</h1>
<div class="top-sub">Gare Montparnasse · Bachir Faye</div>

<!-- DASHBOARD -->
<div class="sec">
  <div class="sec-h">🏠 Tableau de bord</div>
  <div class="sec-b pad">
    <div class="grid2" id="dash-cards"></div>
    <div class="sec" style="margin-bottom:10px">
      <div class="list-head">⚡ À faire maintenant <span class="badge blue" id="dash-todo-badge">0</span></div>
      <div class="list-body" id="dash-actions"></div>
    </div>
  </div>
</div>

<!-- TABAC -->
<div class="sec">
  <div class="sec-h">
    <span>🚬 Tabac</span>
    <button class="btn-mini" onclick="resetAllTabac()">Vider tout</button>
  </div>
  <div class="sec-b">
    <div class="pad">
      <div class="search-row">
        <input id="tabac-search" placeholder="Rechercher une marque ou un emplacement..." oninput="searchTabac()">
        <button onclick="openRecap()">Récap</button>
      </div>
      <div id="search-results"></div>
    </div>

    <div id="tabac-sections"></div>
  </div>
</div>

<!-- COMMANDE -->
<div class="sec">
  <div class="sec-h">
    <span>🛒 Commande</span>
    <span class="badge orange" id="cmd-badge">0</span>
  </div>
  <div class="sec-b">
    <div class="pad">
      <div class="tabs" id="cmd-tabs"></div>
    </div>
    <div id="cmd-list"></div>
    <div class="cmd-form">
      <div style="display:flex;gap:8px">
        <input id="cmd-nom" type="text" placeholder="Nom du produit..." style="flex:1">
        <input id="cmd-qty" type="number" min="1" placeholder="Qté" style="width:70px;text-align:center">
      </div>
      <div style="display:flex;gap:8px">
        <select id="cmd-cat" style="flex:1">
          <option value="tabac">🚬 Tabac</option>
          <option value="alim">🥐 Alimentaire</option>
          <option value="autre">📦 Autre</option>
        </select>
        <button onclick="addManualCmd()" style="border:none;border-radius:8px;padding:9px 16px;font-size:20px;font-weight:900;background:var(--red);color:#fff">+</button>
      </div>
    </div>
  </div>
</div>

<!-- RESERVE -->
<div class="sec">
  <div class="sec-h">📦 Réserve tabac</div>
  <div class="sec-b" id="reserve-list"></div>
</div>

<!-- BOULANGERIE -->
<div class="sec">
  <div class="sec-h">
    <span>🥐 Boulangerie</span>
    <button class="btn-mini" onclick="newBoulDay()">Nouveau jour</button>
  </div>
  <div class="sec-b">
    <div class="boul-al" id="boul-alert"></div>
    <div class="boul-grid" id="boul-grid"></div>
  </div>
</div>

<div class="sec">
  <div class="sec-h">
    <span>🗑️ Destruction du jour</span>
    <span class="badge orange" id="dest-count">0</span>
  </div>
  <div class="sec-b">
    <div id="dest-list"></div>
    <div class="dest-total" id="dest-total" style="display:none"></div>
  </div>
  <button class="btn-valid" id="dest-valid-btn" style="display:none" onclick="validateDestroy()">Déclaré — Réinitialiser</button>
</div>

<!-- DLC -->
<div class="sec">
  <div class="sec-h">
    <span>⏱️ DLC Snacking</span>
    <span class="badge orange" id="dlc-badge">0</span>
  </div>
  <div class="sec-b">
    <div class="dlc-al-r" id="dlc-red"></div>
    <div class="dlc-al-o" id="dlc-orange"></div>
    <table style="font-size:12px">
      <thead>
        <tr>
          <th style="padding:8px;text-align:left">Produit</th>
          <th style="padding:8px;text-align:center;width:50px">Gr.</th>
          <th style="padding:8px;text-align:center;width:70px">Date</th>
          <th style="padding:8px;text-align:center;width:76px">Statut</th>
        </tr>
      </thead>
      <tbody id="dlc-tbody"></tbody>
    </table>
    <div class="cmd-form" style="border-top:1px solid #f3f4f6">
      <div style="display:flex;gap:8px">
        <input id="dlc-nom" type="text" placeholder="Nom du produit..." style="flex:1">
        <input id="dlc-gr" type="text" placeholder="Gr." style="width:60px;text-align:center">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="dlc-date" type="date" style="flex:1">
        <button onclick="addDLC()" style="border:none;border-radius:8px;padding:10px 16px;font-size:20px;font-weight:900;background:var(--red);color:#fff">+</button>
      </div>
    </div>
  </div>
</div>

<!-- PLANNING -->
<div class="sec">
  <div class="sec-h">📅 Planning</div>
  <div class="sec-b pad">
    <div class="plan-top">
      <button onclick="changePlanDay(-1)">◀</button>
      <div class="plan-lbl" id="plan-label"></div>
      <button onclick="changePlanDay(1)">▶</button>
    </div>
    <div class="day-buttons" id="day-buttons"></div>
    <div id="plan-out"></div>
  </div>
</div>

<!-- TODO -->
<div class="sec">
  <div class="todo-head">✅ À faire <span class="todo-count" id="todo-count">0</span></div>
  <div class="todo-body">
    <div id="todo-list"></div>
    <div class="add-row">
      <input id="todo-input" type="text" placeholder="Ajouter une tâche...">
      <button id="todo-add">+</button>
    </div>
  </div>
</div>

<script>
/* ========= utils ========= */
const $ = id => document.getElementById(id);
const LS = {
  tabac:'mb_tabac_v4',
  cmd:'mb_cmd_v4',
  boul:'mb_boul_v4',
  destroy:'mb_destroy_v4',
  dlc:'mb_dlc_v4',

};
const save = (k,v)=>localStorage.setItem(k, JSON.stringify(v));
const load = (k,d)=>{ try{ const x=localStorage.getItem(k); return x ? JSON.parse(x) : d; } catch(e){ return d; } };
const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
const daysFR=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

const today0 = ()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; };
const toHH = h => { const hh=Math.floor(h); const mm=Math.round((h-hh)*60); return hh+'h'+(mm?('0'+mm).slice(-2):'00'); };
const fmtDate = d => daysFR[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
const fmtDM = s => s.slice(8,10)+'/'+s.slice(5,7);

/* ========= TABAC DATA ========= */
const TIROIRS = [
  {title:'Tiroir 1 — Classiques', sections:[
    {label:null, items:[
      {m:"Camel Filters", cap:4},

  {title:'Tiroir 2 — Variétés', sections:[

  if(STOCK[it.m]===undefined) STOCK[it.m]=it.cap;
})));

function tabacSave(){ save(LS.tabac, STOCK); }
function getS(m){ return STOCK[m] ?? 0; }
function setS(m,v){ STOCK[m]=Math.max(0,v); tabacSave(); }

function stClass(c,cap){
  if(c===0) return 'bad';
  if(c<cap) return 'warn';
  if(c===cap) return 'ok';
  return 'over';
}
function stLabel(c,cap){
  if(c===0) return '🔴 Vide';
  if(c<cap) return '⚠️ −'+(cap-c);
  if(c===cap) return '✅ OK';
  return '⬆️ +'+(c-cap);
}

function changeStock(enc, cap, delta){
  const m=decodeURIComponent(enc);
  setS(m, getS(m)+delta);
  renderTabac();
  renderHome();
  if($('tabac-search').value.trim()) searchTabac();
}

function resetAllTabac(){
  if(!confirm('Remettre tout le tabac à 0 ?')) return;
  TIROIRS.forEach(t=>t.sections.forEach(s=>s.items.forEach(it=>STOCK[it.m]=0)));
  tabacSave();
  renderTabac();
  renderHome();
  searchTabac();
}

function resetDrawer(idx){
  if(!confirm('Remettre ce tiroir à 0 ?')) return;
  TIROIRS[idx].sections.forEach(s=>s.items.forEach(it=>STOCK[it.m]=0));
  tabacSave();
  renderTabac();
  renderHome();
  searchTabac();
}

function addCommand(nom, qty, cat){
  if(!qty || qty<=0) return;
  const ex = CMD.find(x => x.nom===nom && x.cat===cat && x.statut<2);
  if(ex) ex.qty += qty;
  else CMD.unshift({nom, qty, cat, statut:0});
  cmdSave();
  renderCmd();
  renderHome();
}

function addFromStock(enc, cap, c){
  const m=decodeURIComponent(enc);
  const manque=cap-c;
  if(manque<=0) return;
  addCommand(m, manque, 'tabac');
}

function addFromReserve(enc){
  const m=decodeURIComponent(enc);
  const q=prompt('Quantité à commander pour "'+m+'" ?', '1');
  if(q===null) return;
  const qty=parseInt(q,10);
  if(!qty || qty<=0) return;
  addCommand(m, qty, 'tabac');
}

function searchTabac(){
  const q=$('tabac-search').value.trim().toLowerCase();
  const box=$('search-results');
  if(!q){ box.style.display='none'; box.innerHTML=''; return; }
  const res=[];
  TIROIRS.forEach(t=>t.sections.forEach(s=>s.items.forEach(it=>{
    const place=t.title + (s.label ? ' · '+s.label : '');
    if(it.m.toLowerCase().includes(q) || place.toLowerCase().includes(q)) res.push({it, place});
  })));
  RESERVE.forEach(r=>{
    if(r.m.toLowerCase().includes(q)) res.push({reserve:true, m:r.m, p:r.p});
  });
  if(!res.length){ box.style.display='block'; box.innerHTML='<div class="sec-b"><div class="pad"><div class="muted">Aucun résultat</div></div></div>'; return; }
  box.style.display='block';
  let h='<div class="sec-b"><table><thead><tr><th>Marque</th><th style="width:130px;text-align:center">Emplacement</th><th style="width:92px;text-align:center">Action</th></tr></thead><tbody>';
  res.forEach(r=>{
    if(r.reserve){
      h+='<tr><td class="tn">'+r.m+'</td><td style="text-align:center;font-size:11px;color:#666">'+r.p+'</td><td style="text-align:center"><button class="btn-cmd" onclick="addFromReserve(\''+encodeURIComponent(r.m)+'\')">Commander</button></td></tr>';
    }else{
      const c=getS(r.it.m), sc=stClass(c, r.it.cap), enc=encodeURIComponent(r.it.m);
      h+='<tr><td class="tn">'+r.it.m+'</td><td style="text-align:center;font-size:11px;color:#666">'+r.place+'</td><td style="text-align:center">';
      h+='<div class="ctrl"><button class="cb" onclick="changeStock(\''+enc+'\','+r.it.cap+',-1)">−</button><span class="cn '+sc+'">'+c+'</span><button class="cb" onclick="changeStock(\''+enc+'\','+r.it.cap+',1)">+</button></div>';
      if(c<r.it.cap) h+=' <button class="btn-cmd" onclick="addFromStock(\''+enc+'\','+r.it.cap+','+c+')">Commander</button>';
      h+='</td></tr>';
    }
  });
  h+='</tbody></table></div>';
  box.innerHTML=h;
}

function renderTabac(){
  let out='';
  TIROIRS.forEach((t,ti)=>{
    out+='<div class="sec">';
    out+='<div class="sec-h"><span>'+t.title+'</span><button class="btn-mini" onclick="resetDrawer('+ti+')">Vider</button></div>';
    out+='<div class="sec-b"><table><thead><tr><th>Marque</th><th style="width:140px;text-align:center">Stock</th><th style="width:72px;text-align:center">Statut</th></tr></thead><tbody>';
    t.sections.forEach(s=>{
      if(s.label) out+='<tr class="sep"><td colspan="3">'+s.label+'</td></tr>';
      s.items.forEach(it=>{
        const c=getS(it.m), sc=stClass(c, it.cap), enc=encodeURIComponent(it.m);
        out+='<tr><td class="tn">'+it.m+'</td><td class="tc"><div class="ctrl"><button class="cb" onclick="changeStock(\''+enc+'\','+it.cap+',-1)">−</button><span class="cn '+sc+'">'+c+'</span><button class="cb" onclick="changeStock(\''+enc+'\','+it.cap+',1)">+</button></div>';
        if(c<it.cap) out+=' <button class="btn-cmd" onclick="addFromStock(\''+enc+'\','+it.cap+','+c+')">Commander</button>';
        out+='</td><td class="ts '+sc+'">'+stLabel(c,it.cap)+'</td></tr>';
      });
    });
    let alerts=[], overs=[];
    t.sections.forEach(s=>s.items.forEach(it=>{
      const c=getS(it.m);
      if(c<it.cap) alerts.push(it.m+' ('+c+'/'+it.cap+')');
      if(c>it.cap) overs.push(it.m);
    }));
    out+='</tbody></table>';
    if(alerts.length || overs.length){
      let msg='';
      if(alerts.length) msg+='Manque : '+alerts.join(' · ');
      if(overs.length) msg+=(msg?'<br>':'')+'Trop : '+overs.join(', ');
      out+='<div class="pad" style="padding-top:8px"><div class="badge orange" style="border-radius:8px">'+msg+'</div></div>';
    }
    out+='</div></div>';
  });
  $('tabac-sections').innerHTML=out;

  let rh='<table><thead><tr><th>Produit</th><th style="width:120px;text-align:center">Emplacement</th><th style="width:88px;text-align:center">Action</th></tr></thead><tbody>';
  RESERVE.forEach((r,i)=>{
    rh+='<tr><td class="tn">'+r.m+'</td><td style="text-align:center;font-size:11px;color:#666">'+r.p+'</td><td style="text-align:center"><button class="btn-cmd" onclick="addFromReserve(\''+encodeURIComponent(r.m)+'\')">Commander</button></td></tr>';
  });
  rh+='</tbody></table>';
  $('reserve-list').innerHTML=rh;
}

function cmdNext(i){
  CMD[i].statut=Math.min(2, CMD[i].statut+1);

function cmdDel(i){

function renderCmd(){
  const tabs=[
    {k:'all', l:'Tout'},
    {k:'tabac', l:'🚬 Tabac'},
    {k:'alim', l:'🥐 Alimentaire'},
    {k:'autre', l:'📦 Autre'}
  ];
  $('cmd-tabs').innerHTML=tabs.map(t=>'<button class="tab'+(activeCat===t.k?' on':'')+'" onclick="setCmdCat(\''+t.k+'\',this)">'+t.l+'</button>').join('');

  const filtered=activeCat==='all' ? CMD : CMD.filter(c=>c.cat===activeCat);
  const labels=['🔴 À commander','🟡 Commandé','✅ Reçu'];
  const cls=['s0','s1','s2'];

  if(!filtered.length){
    $('cmd-list').innerHTML='<div class="pad muted">Aucun produit</div>';

  let h='';
  filtered.forEach(item=>{
    const i=CMD.indexOf(item);
    h+='<div class="cmd-item">';
    h+='<div class="cmd-main"><div class="cmd-name">'+item.nom+'</div><div class="cmd-sub">×'+item.qty+' · '+(item.cat==='tabac'?'🚬':item.cat==='alim'?'🥐':'📦')+'</div></div>';
    h+='<button class="cmd-stat '+cls[item.statut]+'" onclick="cmdNext('+i+')">'+labels[item.statut]+'</button>';
    h+='<button class="cmd-del" onclick="cmdDel('+i+')">✕</button>';

}

}

function destroySave(){ save(LS.destroy, destroyList); }

function daysSince(dateStr){
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((today0()-d)/(1000*60*60*24));
}

function newBoulDay(){
  if(!confirm("Nouveau jour ? Remet les produits quotidiens au standard et remet la date du jour.")) return;
  boul.forEach(b=>{
    if(b.kind==='daily'){
      b.qte=b.std;
      b.date=new Date().toISOString();
      b.destroyed=false;
    }
  });
  destroyList=[];
  boulSave(); destroySave();
  renderBoul();
  renderHome();
}

function boulChg(i, delta){
  boul[i].qte = Math.max(0, boul[i].qte + delta);
  if(!boul[i].date) boul[i].date=new Date().toISOString();
  boulSave();
  renderBoul();
  renderHome();
}

function boulDestroy(i){
  const item=boul[i];
  if(item.destroyed){
    item.destroyed=false;
    item.qte=item.std;
    const idx=destroyList.findIndex(x=>x.nom===item.nom);
    if(idx>=0) destroyList.splice(idx,1);
  }else{
    const qty=item.qte;
    item.destroyed=true;
    const ex=destroyList.find(x=>x.nom===item.nom);
    if(ex) ex.qty += qty;
    else destroyList.push({nom:item.nom, emoji:item.emoji, qty});
    item.qte=0;
  }
  boulSave(); destroySave();
  renderBoul();
  renderHome();
}

function validateDestroy(){
  if(!confirm("Déclarer la destruction et réinitialiser ?")) return;
  destroyList=[];
  boul.forEach(b=>b.destroyed=false);
  destroySave(); boulSave();
  renderBoul();
  renderHome();
}

function renderBoul(){
  let alertes=[], html='';
  boul.forEach((item,i)=>{
    let dlcText='Pas de date', dlcColor='#888';
    if(item.date){
      if(item.kind==='daily'){
        dlcText='Quotidien';
        dlcColor=varGreen();
      }else{
        const diff=daysSince(item.date);
        const reste=3-diff;
        if(reste<=0){ dlcText='🔴 Détruire'; dlcColor='var(--red)'; alertes.push(item.nom); }
        else if(reste===1){ dlcText='🟡 Demain'; dlcColor='var(--orange)'; }
        else { dlcText='✅ J+'+diff; dlcColor='var(--green)'; }
      }
    }
    html+='<div class="boul-card'+(item.destroyed?' destroyed':'')+'">';
    html+='<div class="b-emoji">'+item.emoji+'</div>';
    html+='<div class="b-name">'+item.nom+'</div>';
    if(!item.destroyed){
      html+='<div class="b-ctrl"><button class="b-btn" onclick="boulChg('+i+',-1)">−</button><div class="b-num">'+item.qte+'</div><button class="b-btn" onclick="boulChg('+i+',1)">+</button></div>';
      html+='<div class="b-dlc" style="color:'+dlcColor+'">'+dlcText+'</div>';
      html+='<button class="b-del" onclick="boulDestroy('+i+')">🗑️ Détruire</button>';
    }else{
      html+='<div class="b-dlc" style="color:var(--green);margin-top:6px;font-weight:800">✅ Détruit</div>';
      html+='<button class="b-del ok" onclick="boulDestroy('+i+')">↩ Annuler</button>';
    }
    html+='</div>';
  });
  $('boul-grid').innerHTML=html;

  const al=$('boul-alert');
  if(alertes.length){ al.style.display='block'; al.textContent='⚠️ DLC dépassée : '+alertes.join(', '); }
  else al.style.display='none';

  renderDestroy();
}

function renderDestroy(){
  const badge=$('dest-count');
  const list=$('dest-list');
  const totalBox=$('dest-total');
  const btn=$('dest-valid-btn');

  if(!destroyList.length){
    badge.textContent='0';
    list.innerHTML='<div class="pad muted">Rien détruit aujourd’hui</div>';
    totalBox.style.display='none';
    btn.style.display='none';
    return;
  }

  badge.textContent=String(destroyList.length);
  let total=0;
  list.innerHTML=destroyList.map(d=>{
    total+=d.qty;
    return '<div class="dest-item"><span class="dest-name">'+d.emoji+' '+d.nom+'</span><span class="dest-qty">×'+d.qty+'</span></div>';
  }).join('');
  totalBox.style.display='block';
  totalBox.innerHTML='Total détruit : <b>'+total+' produits</b>';
  btn.style.display='block';
}

let dlc = load(LS.dlc, []);

function addDLC(){
  const nom=$('dlc-nom').value.trim();
  const gr=$('dlc-gr').value.trim();
  const date=$('dlc-date').value;
  if(!nom) return alert('Entrez le nom du produit');
  if(!date) return alert('Entrez la date DLC');
  dlc.unshift({nom, gr:gr||'-', date, retire:false});
  $('dlc-nom').value=''; $('dlc-gr').value=''; $('dlc-date').value='';
  dlcSave(); renderDLC(); renderHome();
}
function dlcToggle(i){ dlc[i].retire=!dlc[i].retire; dlcSave(); renderDLC(); renderHome(); }
function dlcDel(i){ dlc.splice(i,1); dlcSave(); renderDLC(); renderHome(); }
function renderDLC(){
  const n=today0();
  let red=[], orange=[], badge=0, html='';
  const sorted=[...dlc].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!sorted.length){
    html='<tr><td colspan="4" class="pad muted">Ajoutez un produit</td></tr>';
  }else{
    sorted.forEach(item=>{
      const i=dlc.indexOf(item);
      const exp=new Date(item.date); exp.setHours(0,0,0,0);
      const diff=Math.round((exp-n)/(1000*60*60*24));
      let tag='';
      if(item.retire){ tag='<span class="badge green">Retiré</span>'; }
      else if(diff<0){ tag='<span class="badge red">🔴 '+Math.abs(diff)+'j</span>'; red.push(item.nom); badge++; }
      else if(diff===0){ tag='<span class="badge red">🔴 Auj.</span>'; red.push(item.nom); badge++; }
      else if(diff===1){ tag='<span class="badge orange">🟡 Demain</span>'; orange.push(item.nom); badge++; }
      else if(diff<=3){ tag='<span class="badge orange">🟡 '+diff+'j</span>'; }
      else { tag='<span class="badge green">✅ '+diff+'j</span>'; }
      html+='<tr style="'+(item.retire?'opacity:.4':'')+'">';
      html+='<td class="tn" style="'+(item.retire?'text-decoration:line-through':'')+'">'+item.nom+'</td>';
      html+='<td style="text-align:center;font-size:11px;color:#666">'+item.gr+'</td>';
      html+='<td style="text-align:center;font-size:11px">'+fmtDM(item.date)+'</td>';
      html+='<td style="text-align:center">';
      html+=tag;
      html+='<div style="margin-top:3px;display:flex;justify-content:center;gap:8px">';
      html+='<span style="font-size:10px;color:#888;text-decoration:underline;cursor:pointer" onclick="dlcToggle('+i+')">'+(item.retire?'Annuler':'✓')+'</span>';
      html+='<span style="font-size:10px;color:var(--red);cursor:pointer" onclick="dlcDel('+i+')">✕</span>';
      html+='</div></td></tr>';
    });
  }
  $('dlc-tbody').innerHTML=html;
  $('dlc-badge').textContent=String(badge);
  const ar=$('dlc-red'), ao=$('dlc-orange');
  if(red.length){ ar.style.display='block'; ar.textContent='🔴 À retirer MAINTENANT : '+red.join(', '); } else ar.style.display='none';
  if(orange.length){ ao.style.display='block'; ao.textContent='🟡 À retirer DEMAIN : '+orange.join(', '); } else ao.style.display='none';
}

/* ========= PLANNING ========= */
const PLAN = {
  lundi: {
    bf:[[11,16.5]],
    bd:[[6,13]],
    d:[[16,20.5]],
    k:[[16.5,20.5]],
    y:[[9,15]]
  },
  mardi: {
    bf:[[15.5,20.5]],
    bd:[[6,13]],
    d:[[11.5,15.5]],
    k:[[17,20.5]]
  },
  mercredi: {
    bf:[[10,15.5]],
    bd:[[6,13]],
    d:[[16,20.5]],
    k:[[16,20.5]],
    y:[[9,14]]
  },
  jeudi: {
    bf:[[14,20.5]],
    bd:[[6,13]],
    d:[[14.5,20.5]],
    k:[[11,14]],
    y:[[10,14]]
  },
  vendredi: {
    bf:[[16.5,20.5]],
    bd:[[6,13]],
    d:[[17,20.5]],
    k:[[12,14]],
    ba:[[11.5,17]]
  },
  samedi: {
    ba:[[13,20]],
    bd:[[11,14]],
    d:[[16,20]]
  },
  dimanche: {}
};

const EMP = [
  {id:'bf', name:'Bachir Faye', short:'Bachir', color:'#E8192C', cls:'red', toi:true},
  {id:'bd', name:'Badroudine', short:'Badrou', color:'#3b82f6', cls:'blue'},
  {id:'d',  name:'Dame', short:'Dame', color:'#8b5cf6', cls:'purple'},
  {id:'k',  name:'Karim', short:'Karim', color:'#16A34A', cls:'green'},
  {id:'ba', name:'Baba', short:'Baba', color:'#f97316', cls:'orange'},
  {id:'y',  name:'Yacine', short:'Yacine', color:'#06b6d4', cls:'cyan'}
];

let planIndex = 0;
const planDays = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
const planLabels = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

function hoursSum(list){ return list.reduce((a,b)=>a+(b[1]-b[0]),0); }
function weekHours(id){
  let total=0;
  Object.values(PLAN).forEach(day=>{ if(day[id]) total+=hoursSum(day[id]); });
  return total;
}
function changePlanDay(delta){
  planIndex = Math.max(0, Math.min(6, planIndex + delta));
  renderPlan();
}
function setPlanDay(i){
  planIndex=i;
  renderPlan();
}
function renderPlan(){
  $('plan-label').textContent = 'Semaine du 16 au 22 mars 2026';
  $('day-buttons').innerHTML = planLabels.map((l,i)=>'<button class="day-btn'+(i===planIndex?' on':'')+'" onclick="setPlanDay('+i+')"><div class="d1">'+l.slice(0,3)+'</div><div class="d2">'+(17+i)+'</div></button>').join('');

  const key=planDays[planIndex];
  const dp=PLAN[key] || {};
  const S=6, E=21, T=E-S;
  const ticks=[];
  for(let h=S; h<=E; h+=2) ticks.push(h+'h');

  let out='';
  out+='<div class="plan-box"><div class="timeline">';
  out+='<div class="tl-head">'+ticks.map(t=>'<div class="tl-tick">'+t+'</div>').join('')+'</div>';
  EMP.forEach(emp=>{
    const sh=dp[emp.id];
    out+='<div class="tl-row">';
    out+='<div class="tl-name">'+emp.short+'</div>';
    out+='<div class="tl-track">';
    if(sh){
      const l=((sh[0]-S)/T)*100;
      const w=((sh[1]-sh[0])/T)*100;
      out+='<div class="tl-bar" style="left:'+l+'%;width:'+w+'%;background:'+emp.color+'">'+toHH(sh[0])+'–'+toHH(sh[1])+'</div>';
    }
    out+='</div></div>';
  });
  out+='</div></div>';

  out+='<div class="emp-box">';
  const present = EMP.filter(e=>!!dp[e.id]);
  if(present.length){
    present.forEach(emp=>{
      const sh=dp[emp.id][0];
      const eh=dp[emp.id][1];
      out+='<div class="emp-row">';
      out+='<div class="emp-av" style="background:'+emp.color+'">'+emp.short[0]+'</div>';
      out+='<div class="emp-info"><div class="emp-name">'+emp.name+(emp.toi?'<span class="badge red" style="margin-left:6px">TOI</span>':'')+'</div><div class="emp-hours">'+toHH(sh)+' → '+toHH(eh)+'</div></div>';
      out+='<div class="emp-start">'+toHH(sh)+'</div>';
      out+='</div>';
    });
  }else{
    out+='<div class="pad muted">Personne ce jour</div>';
  }
  out+='</div>';

  out+='<div class="tot-box"><div class="tot-t">Total heures semaine</div>';
  EMP.forEach(emp=>{
    const total = weekHours(emp.id);
    if(total>0) out+='<div class="tot-row"><span class="tot-n">'+emp.name+'</span><span class="tot-v">'+total.toFixed(1)+'h</span></div>';
  });
  out+='</div>';

  $('plan-out').innerHTML=out;
}

/* ========= TODO ========= */
let TODO = load(LS.todo, []);
if(!TODO.length){
  TODO = [
    {t:'Vérifier DLC plateau boulangerie', done:false},
    {t:'Tour des tiroirs tabac', done:false},
    {t:'Bordereau invendus MMLP', done:false},
    {t:'Transfert Too Good To Go → Jean-Philippe', done:false},
    {t:'Réappro frigo boissons', done:false}
  ];
}
function todoSave(){ save(LS.todo, TODO); }
function todoAdd(){
  const v=$('todo-input').value.trim();
  if(!v) return;
  TODO.unshift({t:v, done:false});
  $('todo-input').value='';
  todoSave();
  renderTodo();
  renderHome();
}
function todoToggle(i){
  TODO[i].done=!TODO[i].done;
  todoSave();
  renderTodo();
  renderHome();
}
function renderTodo(){
  $('todo-count').textContent = TODO.filter(x=>!x.done).length;
  $('dash-todo-badge').textContent = TODO.filter(x=>!x.done).length;
  $('todo-list').innerHTML = TODO.length
    ? TODO.map((x,i)=>'<div class="list-item'+(x.done?' done':'')+'" onclick="todoToggle('+i+')"><div class="list-check">'+(x.done?'✓':'')+'</div><div class="list-txt">'+x.t+'</div></div>').join('')
    : '<div class="pad muted">Rien pour l’instant</div>';
}
$('todo-add').addEventListener('click', todoAdd);
$('todo-input').addEventListener('keydown', e=>{ if(e.key==='Enter') todoAdd(); });

/* ========= DASHBOARD ========= */
function renderHome(){
  const n=today0();

  let tBad=0, tWarn=0, tOver=0;
  TIROIRS.forEach(t=>t.sections.forEach(s=>s.items.forEach(it=>{
    const c=getS(it.m);
    if(c===0) tBad++;
    else if(c<it.cap) tWarn++;
    else if(c>it.cap) tOver++;
  })));

  let cPend=CMD.filter(x=>x.statut<2).length;
  let dBad=0, dWarn=0;
  dlc.forEach(d=>{
    if(d.retire) return;
    const exp=new Date(d.date); exp.setHours(0,0,0,0);
    const diff=Math.round((exp-n)/(1000*60*60*24));
    if(diff<=0) dBad++;
    else if(diff===1) dWarn++;
  });

  let bBad=0;
  boul.forEach(b=>{
    if(b.destroyed) return;
    if(b.kind==='dated' && b.date){
      if(daysSince(b.date)>=3) bBad++;
    }
  });

  let todoRem = TODO.filter(x=>!x.done).length;

  $('dash-cards').innerHTML = [
    {cls:tBad>0?'red':tWarn>0?'orange':tOver>0?'blue':'green', i:'🚬', l:'Tabac', v:tBad>0?tBad:tWarn>0?tWarn:tOver>0?tOver:'✅', s:tBad>0?'vides':tWarn>0?'manquent':tOver>0?'trop':'Tout OK'},
    {cls:bBad>0?'red':'green', i:'🥐', l:'Boulangerie', v:bBad>0?bBad:'✅', s:bBad>0?'à détruire':'OK'},
    {cls:dBad>0?'red':dWarn>0?'orange':'green', i:'⏱️', l:'DLC', v:dBad>0?dBad:dWarn>0?dWarn:'✅', s:dBad>0?'à retirer':dWarn>0?'demain':'Tout OK'},
    {cls:cPend>0?'orange':'green', i:'🛒', l:'Commandes', v:cPend, s:cPend>0?'en attente':'Tout reçu'}
  ].map(c=>'<div class="card '+c.cls+'"><div class="i">'+c.i+'</div><div class="l">'+c.l+'</div><div class="v">'+c.v+'</div><div class="s">'+c.s+'</div></div>').join('');

  let act='';
  if(tBad>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varRed()+';color:'+varRed()+'">!</div><div class="list-txt">Tiroirs vides à remplir</div><span class="badge red">'+tBad+'</span></div>';
  if(tWarn>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varOrange()+';color:'+varOrange()+'">!</div><div class="list-txt">Tabac sous capacité</div><span class="badge orange">'+tWarn+'</span></div>';
  if(tOver>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varBlue()+';color:'+varBlue()+'">!</div><div class="list-txt">Tabac au-dessus de la capacité</div><span class="badge blue">'+tOver+'</span></div>';
  if(dBad>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varRed()+';color:'+varRed()+'">!</div><div class="list-txt">Retirer produits DLC dépassés</div><span class="badge red">'+dBad+'</span></div>';
  if(dWarn>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varOrange()+';color:'+varOrange()+'">!</div><div class="list-txt">DLC à surveiller demain</div><span class="badge orange">'+dWarn+'</span></div>';
  if(bBad>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varRed()+';color:'+varRed()+'">!</div><div class="list-txt">Boulangerie à détruire</div><span class="badge red">'+bBad+'</span></div>';
  if(cPend>0) act+='<div class="list-item"><div class="list-check" style="border-color:'+varOrange()+';color:'+varOrange()+'">!</div><div class="list-txt">Commandes en attente</div><span class="badge orange">'+cPend+'</span></div>';
  TODO.filter(x=>!x.done).slice(0,3).forEach(x=>{
    act+='<div class="list-item"><div class="list-check" style="border-color:'+varGreen()+';color:'+varGreen()+'">✓</div><div class="list-txt">'+x.t+'</div></div>';
  });
  if(!act) act='<div class="pad muted">Tout est bon.</div>';
  $('dash-actions').innerHTML=act;
  $('dash-todo-badge').textContent=todoRem;
}

/* ========= helpers colors ========= */
function varRed(){ return getComputedStyle(document.documentElement).getPropertyValue('--red').trim(); }
function varOrange(){ return getComputedStyle(document.documentElement).getPropertyValue('--orange').trim(); }
function varGreen(){ return getComputedStyle(document.documentElement).getPropertyValue('--green').trim(); }
function varBlue(){ return getComputedStyle(document.documentElement).getPropertyValue('--blue').trim(); }

/* ========= init ========= */
function renderAll(){
  renderTabac();
  renderCmd();
  renderBoul();
  renderDLC();
  renderTodo();
  renderHome();
  renderPlan();
}
renderAll();
</script>
